<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoMission</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(to bottom,#74c0fc,#d8f3dc);
    color:#1b4332;
}

h1{font-size:50px;}

.card{
    background:white;
    width:420px;
    margin:auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

button{
    padding:12px 18px;
    margin:6px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.green{background:#2d6a4f;color:white;}
.blue{background:#219ebc;color:white;}
.red{background:#d62828;color:white;}

.points{
    font-size:40px;
    margin:10px;
}

input{
    width:90%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* PERFIL */
#profileScreen{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.profileContent{
    background:white;
    width:420px;
    margin:80px auto;
    padding:20px;
    border-radius:15px;
}
</style>
</head>

<body>

<h1>🌍 EcoMission</h1>

<p>Completa misiones ecológicas 🌱</p>

<div class="card">

<h2>🎯 Misión</h2>
<p id="mission">...</p>

<h2>✍ Experiencia</h2>
<input id="experience" placeholder="Escribe lo que hiciste">

<h2>🌱 Puntos</h2>
<div class="points" id="points">0</div>

<p id="co2">CO₂ evitado: 0 kg</p>

<button class="green" onclick="completarMision()">
✔ Completar misión
</button>

<button class="blue" onclick="nuevaMision()">
🔄 Nueva misión
</button>

<button class="blue" onclick="abrirPerfil()">
👤 Ver perfil
</button>

</div>

<!-- PERFIL -->
<div id="profileScreen">

<div class="profileContent">

<button class="red" onclick="cerrarPerfil()">❌</button>

<h2>👤 Tu perfil</h2>

<p id="perfilNivel">Nivel: Principiante 🌱</p>
<p id="perfilMedalla">Medallas: Ninguna 🏅</p>
<p id="perfilPuntos">Puntos: 0</p>

<button class="red" onclick="reiniciarTodo()">
🔄 Reiniciar progreso
</button>

</div>

</div>

<script>

let puntos = 0;
let co2 = 0;

const misiones = [
"Reciclar ♻️",
"Apagar luces 💡",
"Usar bicicleta 🚴",
"Ahorro de agua 💧",
"Reducir plástico 🌎",
"Evitar desperdicio de comida 🍎"
];

// 🔥 helper limpio
const $ = (id) => document.getElementById(id);

// 🎯 misión aleatoria
function nuevaMision(){
    const m = misiones[Math.floor(Math.random() * misiones.length)];
    $("mission").innerText = m;
}

// 🧠 puntos según calidad
function calcularPuntos(texto){

    texto = texto.trim();
    if(texto.length < 5) return 0;

    const palabras = texto.split(" ").length;

    let pts = 10;

    if(palabras >= 8) pts = 15;
    if(palabras >= 15) pts = 20;

    const ecoWords = ["recicle", "planté", "ahorré", "cuidé", "bicicleta", "reutilicé"];

    if(ecoWords.some(w => texto.toLowerCase().includes(w))){
        pts += 5;
    }

    return pts;
}

// ✔ completar misión
function completarMision(){

    const exp = $("experience").value;
    const ganados = calcularPuntos(exp);

    if(!ganados){
        alert("Escribe una experiencia más real 🌱");
        return;
    }

    puntos += ganados;
    co2 += 2;

    actualizarUI();
    actualizarPerfil();

    agregarHistorial(exp, ganados);

    $("experience").value = "";

    nuevaMision();
}

// 📜 historial
function agregarHistorial(exp, ganados){

    const m = $("mission").innerText;

    const li = document.createElement("li");

    li.innerHTML = `
        ✔ ${m}<br>
        💬 ${exp}<br>
        ⭐ +${ganados} puntos
    `;

    $("history")?.appendChild(li);
}

// 👤 perfil
function abrirPerfil(){
    $("profileScreen").style.display = "block";
    actualizarPerfil();
}

function cerrarPerfil(){
    $("profileScreen").style.display = "none";
}

// 🔄 reinicio
function reiniciarTodo(){

    if(!confirm("¿Seguro que quieres reiniciar? 🌍")) return;
    if(!confirm("Esto borrará todo ❌")) return;

    puntos = 0;
    co2 = 0;

    $("history")?.innerHTML = "";

    actualizarUI();
    actualizarPerfil();
}

// 🔥 UI principal
function actualizarUI(){
    $("points").innerText = puntos;
    $("co2").innerText = `CO₂ evitado: ${co2} kg`;
}

// 🏆 perfil
function actualizarPerfil(){

    $("perfilPuntos").innerText = `Puntos: ${puntos}`;

    let nivel = "Leyenda 👑";

    if(puntos < 30) nivel = "Principiante 🌱";
    else if(puntos < 60) nivel = "Aprendiz 🌿";
    else if(puntos < 100) nivel = "Protector 🌍";

    $("perfilNivel").innerText = `Nivel: ${nivel}`;

    let medalla = "Oro 🥇";

    if(puntos < 50) medalla = "Ninguna 🏅";
    else if(puntos < 100) medalla = "Bronce 🥉";
    else if(puntos < 150) medalla = "Plata 🥈";

    $("perfilMedalla").innerText = `Medallas: ${medalla}`;
}

// 🚀 inicio
nuevaMision();
actualizarUI();
actualizarPerfil();

</script>

</body>
</html>
